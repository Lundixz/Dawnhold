<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Dawnhold - A premium, GPU-accelerated classic strategy and colony simulation game." />
    <title>Dawnhold | Classic Strategy & Colony Simulation</title>
    <!-- Google Fonts: Inter & Outfit for premium RTS HUD aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      /* Prevent scrolling, bounce, and context selection overlays */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0b0c10;
        font-family: 'Inter', sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        fetch('http://localhost:3001/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'onerror', message, source, lineno, colno, stack: error?.stack })
        }).catch(err => console.warn('Failed to send error log to backend', err));
      };
      window.onunhandledrejection = function (event) {
        fetch('http://localhost:3001/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'onunhandledrejection', message: event.reason?.message || String(event.reason), stack: event.reason?.stack })
        }).catch(err => console.warn('Failed to send error log to backend', err));
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
